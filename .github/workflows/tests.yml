name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check gptmock/ tests/

      - name: Run tests with coverage
        run: |
          uv run pytest tests/test_env_precedence.py tests/test_bootstrap.py \
            --cov=gptmock --cov-report=term --cov-report=json -v

      - name: Extract coverage percentage
        if: always()
        id: coverage
        run: |
          COVERAGE=$(python3 -c "import json; print(round(json.load(open('coverage.json'))['totals']['percent_covered']))")
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "### Test Coverage: ${COVERAGE}%" >> "$GITHUB_STEP_SUMMARY"

      # Coverage badge via GitHub Gist
      # Requires repo secret GIST_TOKEN (fine-grained PAT with gist scope only)
      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.GIST_TOKEN != ''
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 255a945245d92c731d002ee3be93a74c
          filename: gptmock-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          valColorRange: ${{ steps.coverage.outputs.percentage }}
          maxColorRange: 100
          minColorRange: 0
